    <h1>Contact Me</h1>
    <p>Let’s connect! I’m always open to opportunities and collaborations.</p>

    <form class="contact-form" action="mailto:lnaghea@gmail.com" method="post" enctype="text/plain">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit" class="btn olive">Send Message</button>
    </form>
